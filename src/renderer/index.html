<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>암송킹</title>
  <style>
    body { margin: 0; background: #0a0a1a; }
    #loading-screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      z-index: 9999;
    }
    #loading-screen .loading-title {
      font-size: 2rem; color: #ffd700; font-weight: bold;
      margin-bottom: 24px; font-family: sans-serif;
    }
    #loading-screen .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-screen .loading-text {
      margin-top: 20px; color: #aaa;
      font-size: 0.95rem; font-family: sans-serif;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-title">암송킹</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">로딩 중...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
